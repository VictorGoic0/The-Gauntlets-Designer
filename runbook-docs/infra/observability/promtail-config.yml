server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: PROJECT_NAME_HERE-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: PROJECT_NAME_HERE-api
          env: dev
          __path__: /logs/dev.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            msg: msg
            time: time
      - labels:
          level:
          service:
      - timestamp:
          source: time
          format: RFC3339Nano
